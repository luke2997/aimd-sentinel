services:
  routeguard-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8008:8008"
    env_file:
      - .env.routeguard.example
    command: >
      bash -lc "pip install -r requirements.txt -r routeguard_med/requirements-routeguard.txt &&
      uvicorn routeguard_med.api.main:app --host 0.0.0.0 --port 8008"

  routeguard-ui:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - routeguard-api
    environment:
      - ROUTEGUARD_API_URL=http://routeguard-api:8008
    command: >
      bash -lc "pip install -r requirements.txt -r routeguard_med/requirements-routeguard.txt &&
      streamlit run routeguard_med/frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"


